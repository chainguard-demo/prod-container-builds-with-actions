name: Action Lint
on:
  pull_request:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

  push:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions: {}

jobs:
  action-lint:
    permissions:
      contents: read # Clone the repository
    name: Action lint
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            *.githubapp.com:443
            api.github.com:443
            github.com:443
            go.dev:443
            hooks.slack.com:443
            release-assets.githubusercontent.com:443

      - name: Check out code
        uses: chainguard-actions/checkout@d1f1061cdaee56aa3a3bc3deb86b67b1db772dd6 # v6.0.2
        with:
          persist-credentials: false

      - name: Find yamls
        id: get_yamls
        run: |
          set -ex
          mapfile -t yamls < <(find .github/workflows -name "*.y*ml" | grep -v dependabot.)
          echo "files=${yamls[*]}" >> "${GITHUB_OUTPUT}"

      - name: Action lint
        uses: chainguard-actions/action-actionlint@74244c9d2a3d7e9bd1781ca6ecd75dc47119a777 # v1.71.0
        env:
          SHELLCHECK_OPTS: "--exclude=SC2129"
        with:
          actionlint_flags: ${{ steps.get_yamls.outputs.files }}
